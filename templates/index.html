<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Abhi Signals</title>

<link
rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="container">

<h1>ABHI SIGNALS</h1>

<div class="card">

<label>Pair</label>

<select id="pair">

<option value="EUR/USD">
EUR/USD
</option>

<option value="AUD/USD">
AUD/USD
</option>

</select>

<label>Time Frame</label>

<select id="timeframe">

<option value="1min">
1 Minute
</option>

<option value="5min">
5 Minute
</option>

</select>

</div>

<div class="card">

<h2>Countdown</h2>

<div
id="countdown"
class="countdown">

00:00

</div>

</div>

<div class="card">

<h2>Signal</h2>

<div
id="signal"
class="signal-box">

WAITING...

</div>

</div>

<div class="card">

<h2>Confidence</h2>

<div
id="confidence">

0%

</div>

</div>

<div class="card">

<h2>Trend</h2>

<div
id="trend">

Neutral

</div>

</div>

<div class="card">

<h2>Score</h2>

<div
id="score">

0

</div>

</div>

<div class="card">

<h2>Support</h2>

<div
id="support">

-

</div>

</div>

<div class="card">

<h2>Resistance</h2>

<div
id="resistance">

-

</div>

</div>

<div class="card">

<h2>API Requests</h2>

<div
id="requests">

800

</div>

</div>

<div class="card">

<h2>Reasons</h2>

<ul id="reasons">

<li>Waiting...</li>

</ul>

</div>

<div class="button-row">

<button id="startBtn">

START

</button>

<button id="stopBtn">

STOP

</button>

</div>

</div>

<script src="/static/app.js"></script>

</body>
</html>
